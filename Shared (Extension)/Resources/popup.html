<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Freedirect</title>
  <style>
    :root { color-scheme: light dark; --bg: oklch(1 0 0); --surface: oklch(0.975 0.003 91.3); --ink: oklch(0.205 0.018 255); --muted: oklch(0.46 0.018 255); --primary: oklch(0.68 0.155 87); --border: oklch(0.88 0.008 255); --error: oklch(0.55 0.18 28); }
    @media (prefers-color-scheme: dark) { :root { --bg: oklch(0.12 0 0); --surface: oklch(0.18 0.006 255); --ink: oklch(0.93 0 0); --muted: oklch(0.72 0.012 255); --border: oklch(0.32 0.012 255); } }
    * { box-sizing: border-box; }
    body { width: 280px; margin: 0; padding: 14px; color: var(--ink); background: var(--bg); font: 14px/1.42 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    h1 { margin: 0; font-size: 17px; line-height: 1.15; }
    button { width: 100%; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--ink); padding: 8px 10px; font: inherit; cursor: pointer; }
    button.primary { border-color: transparent; background: var(--primary); color: white; font-weight: 650; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    button:focus-visible, input:focus-visible { outline: 3px solid color-mix(in oklab, var(--primary), white 45%); outline-offset: 2px; }
    .switch { display: inline-flex; align-items: center; gap: 7px; white-space: nowrap; }
    .status { color: var(--muted); font-size: 12px; }
    .panel { border: 1px solid var(--border); background: var(--surface); border-radius: 14px; padding: 12px; margin-bottom: 10px; }
    .row { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .label { font-weight: 650; }
    .value { color: var(--muted); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 145px; }
    .detail { color: var(--muted); font-size: 12px; margin-top: 6px; overflow-wrap: anywhere; }
    .error { color: var(--error); }
    .actions { display: grid; gap: 8px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 data-i18n="extensionName">Freedirect</h1>
      <div class="status" id="status" data-i18n="popupLoading" aria-live="polite">Loading…</div>
    </div>
    <label class="switch"><input id="enabled" type="checkbox"> <span data-i18n="popupOn">On</span></label>
  </header>

  <section class="panel" aria-label="Current page">
    <div class="row"><span class="label" data-i18n="popupCurrentPage">Current page</span><span id="pageMatch" class="value" aria-live="polite">—</span></div>
    <div class="detail" id="pageTarget" aria-live="polite">—</div>
  </section>

  <div class="actions">
    <button class="primary hidden" id="primaryAction">Open</button>
    <button id="options" data-i18n="popupSettings">Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
