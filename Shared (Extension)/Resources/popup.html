<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Freedirect</title>
  <style>
    :root { color-scheme: light dark; --bg: oklch(1 0 0); --ink: oklch(0.205 0.018 255); --muted: oklch(0.46 0.018 255); --primary: oklch(0.68 0.155 87); --border: oklch(0.88 0.008 255); --error: oklch(0.55 0.18 28); }
    @media (prefers-color-scheme: dark) { :root { --bg: oklch(0.12 0 0); --ink: oklch(0.93 0 0); --muted: oklch(0.72 0.012 255); --border: oklch(0.32 0.012 255); } }
    * { box-sizing: border-box; }
    html { min-width: 300px; }
    body { width: min(100vw, 420px); min-width: 300px; max-width: 100%; margin: 0 auto; padding: 12px 14px 14px; color: var(--ink); background: var(--bg); font: -apple-system-body; -webkit-text-size-adjust: 100%; }
    header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    header hgroup { flex: 1; min-width: 0; }
    h1 { margin: 0; font-size: 16px; font-weight: 590; line-height: 1.2; }
    .status { color: var(--muted); font-size: 12px; line-height: 1.3; }
    .status.error { color: var(--error); font-weight: 590; }
    .status.ok { color: color-mix(in oklch, var(--ink), transparent 20%); }
    button { width: 100%; min-height: 38px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--ink); padding: 8px 12px; font: inherit; font-size: 13px; cursor: pointer; transition: background 0.12s; }
    button:active { background: var(--border); }
    button.primary { border-color: transparent; background: var(--primary); color: white; font-weight: 590; }
    button.primary:active { background: color-mix(in oklch, var(--primary), black 18%); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    button:focus-visible, input:focus-visible { outline: 2.5px solid color-mix(in oklch, var(--primary), white 40%); outline-offset: 2px; }
    .switch { display: inline-flex; align-items: center; gap: 6px; min-height: 38px; white-space: nowrap; flex-shrink: 0; }
    .switch input { width: 18px; height: 18px; margin: 0; accent-color: var(--primary); }
    .switch span { font-size: 13px; color: var(--muted); }
    .panel { border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; margin-bottom: 10px; }
    .panel-row { display: flex; align-items: baseline; gap: 10px; }
    .panel-label { font-weight: 590; font-size: 13px; color: var(--ink); white-space: nowrap; }
    .panel-value { color: var(--muted); font-size: 13px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .panel-detail { color: var(--muted); font-size: 12px; line-height: 1.35; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); overflow-wrap: anywhere; }
    .actions { display: grid; gap: 8px; }
    .actions .secondary { font-size: 13px; color: var(--muted); }
    @media (max-width: 320px) { body { padding: 10px; } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header>
    <hgroup>
      <h1 data-i18n="extensionName">Freedirect</h1>
      <div class="status" id="status" data-i18n="popupLoading" aria-live="polite">Loading…</div>
    </hgroup>
    <label class="switch"><input id="enabled" type="checkbox"> <span data-i18n="popupOn">On</span></label>
  </header>

  <section class="panel" aria-label="Current page">
    <div class="panel-row"><span class="panel-label" data-i18n="popupCurrentPage">Page</span><span id="pageMatch" class="panel-value" aria-live="polite">—</span></div>
    <div class="panel-detail" id="pageTarget" aria-live="polite">—</div>
  </section>

  <div class="actions">
    <button class="primary hidden" id="primaryAction" data-i18n="popupRedirectPage">Open</button>
    <button class="hidden" id="farsideAction" data-i18n="popupFarside">Reload with Farside</button>
    <button id="options" data-i18n="popupSettings">Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
